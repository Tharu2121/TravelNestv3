<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelNest | Destinations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="destination">
    <header class="site-header">
        <a class="logo" href="home.html">TravelNest</a>
        <button class="menu-button" aria-label="Toggle navigation">☰</button>
        <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="destination.html">Destinations</a>
            <a href="tripBudged.html">Budget Planner</a>
            <a href="tripGenerator.html">Trip Generator</a>
            <a href="travelMood.html">Travel Mood</a>
            <a href="feedback.html">Feedback</a>
        </nav>
    </header>

    <main class="page-content">
        <section class="page-header">
            <h1>Destination Explorer</h1>
            <p>Browse travel cards, filter by continent or location, and view full trip details.</p>
        </section>

        <section class="explorer-controls">
            <label>
                Search by location
                <input type="search" id="destinationSearch" placeholder="Enter destination name">
            </label>
            <label>
                Continent filter
                <select id="continentFilter">
                    <option value="all">All continents</option>
                </select>
            </label>
        </section>

        <section class="card-grid" id="destinationGrid"></section>
    </main>

    <div class="modal" id="destinationModal" aria-hidden="true">
        <div class="modal-content">
            <button class="close-modal" id="closeDestinationModal" aria-label="Close">×</button>
            <h2 id="modalTitle"></h2>
            <p id="modalText"></p>
            <table>
                <tbody id="modalTable"></tbody>
            </table>
        </div>
    </div>

    <footer class="site-footer compact-footer">
        <p>Discover your next destination with TravelWise.</p>
    </footer>
    <script src="script.js" defer></script>
</body>
</html>
